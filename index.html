<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tobago Art Map — Digital Hub</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Montserrat:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    
    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

    <!-- CSS (FLAT STRUCTURE FIX) -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="main-header">
    <div class="logo-container">
        <a href="#" class="logo">Tobago Art Map</a>
    </div>
    <nav class="main-nav">
        <button class="nav-btn active" data-target="home-view">Home</button>
        <button class="nav-btn" data-target="map-view">Explore Map</button>
        <button class="nav-btn" data-target="artists-view">Artists</button>
        <button class="nav-btn" data-target="attractions-view">Attractions</button>
        <button class="nav-btn" data-target="festivals-view">Festivals</button>
        <button class="nav-btn" data-target="about-view">About</button>
    </nav>
</header>

<!-- HOME -->
<div id="home-view" class="view-section">

    <section class="immersive-hero">

        <!-- FIX: safe root-level image reference -->
        <div class="parallax-layer layer-bg">
            <img src="tobago_art_map.jpg" alt="Tobago Art Map Background" class="hero-map-img">
        </div>

        <div class="parallax-layer layer-water"></div>

        <div class="parallax-layer layer-clouds">
            <div class="cloud cloud-1"></div>
            <div class="cloud cloud-2"></div>
            <div class="cloud cloud-3"></div>
        </div>

        <div class="hero-overlay">
            <div class="hero-content-wrapper">
                <h1 class="hero-title-main">Art Map Tobago</h1>
                <p class="hero-tagline">A Living Interactive Cultural Atlas</p>

                <div class="hero-actions">
                    <button class="btn-enter" onclick="switchView('map-view')">
                        Explore the Island
                    </button>
                </div>
            </div>
        </div>

    </section>

    <!-- DOWNLOAD FIXED -->
    <section class="heritage-preview">

        <a href="tobago_art_map.jpg" download>
            Download Map Side (High Res)
        </a>

        <a href="tobago_art_map_info.jpg" download>
            Download Directory Side
        </a>

    </section>

</div>

<!-- MAP VIEW -->
<div id="map-view" class="view-section hidden">
    <div class="explore-container">

        <aside class="directory-side">
            <div id="directory-list"></div>
        </aside>

        <main class="map-side">
            <div id="map"></div>
        </main>

    </div>
</div>

<!-- OTHER VIEWS -->
<div id="artists-view" class="view-section hidden"><div id="artist-grid"></div></div>
<div id="attractions-view" class="view-section hidden"><div id="attractions-grid"></div></div>
<div id="festivals-view" class="view-section hidden"><div id="festivals-grid"></div></div>
<div id="about-view" class="view-section hidden"><h1>The Art Map 2026</h1></div>

<!-- MODAL -->
<div class="modal-overlay" id="profile-modal">
    <div class="modal-content">
        <button class="close-modal">&times;</button>
        <img id="modal-img">
        <h2 id="modal-title"></h2>
        <p id="modal-desc"></p>
    </div>
</div>

<!-- SCRIPTS (IMPORTANT ORDER FIX FOR MAP) -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- DATA FIRST -->
<script src="data.js"></script>

<!-- MAP MUST LOAD AFTER DATA -->
<script src="map.js"></script>

<!-- MAIN LAST -->
<script src="main.js"></script>

<!-- SAFETY FIX: ensures map always initializes AFTER DOM -->
<script>
window.addEventListener("load", () => {
    if (typeof initMap === "function") {
        initMap();
    }
});
</script>

</body>
</html>
